    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        color: #fff;
        font-family: 'Barlow', sans-serif;
        min-height: 100%;
        overflow-x: hidden;
        background: #000;
    }

    




    /* Ambient top glow */

    .hidden { display: none !important; }

    /* ===================== SCREENS ===================== */
    .screen {
        position: relative; z-index: 10;
        min-height: 100dvh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 32px 20px;
    }

    /* ===================== EYEBROW ===================== */
    .eyebrow {
        font-family: 'Barlow', sans-serif;
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: var(--muted);
    }

    /* ===================== SETUP ===================== */
    #setup-screen { gap: 0; }

    .setup-logo {
        text-align: center;
        margin-bottom: 56px;
    }

    .setup-logo h1 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: clamp(72px, 22vw, 110px);
        font-weight: 900;
        font-style: italic;
        letter-spacing: -0.01em;
        line-height: 0.88;
        text-transform: uppercase;
        color: #fff;
    }

    .setup-logo h1 em {
        color: var(--lime);
        font-style: italic;
    }

    .setup-logo .sub {
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.35em; text-transform: uppercase;
        color: var(--muted);
        margin-top: 10px;
    }

    .setup-form {
        width: 100%; max-width: 360px;
        border: 1px solid var(--border2);
        border-radius: 16px;
        padding: 28px;
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(16px);
    }

    .field { margin-bottom: 18px; }

    .field-label {
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 8px; display: block;
        text-align: center;
    }

    .field-label.lime { color: var(--lime); }
    .field-label.red  { color: var(--red); }
    .field-label.gold { color: #eab308; }

    .stepper {
        display: flex; align-items: center; gap: 8px;
    }

    .stepper-btn {
        width: 42px; height: 42px;
        background: rgba(210,255,0,0.06);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--lime);
        font-size: 22px; font-weight: 900;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        flex-shrink: 0;
    }
    .stepper-btn:hover {
        background: rgba(210,255,0,0.18);
        box-shadow: 0 0 16px rgba(210,255,0,0.15);
        transform: scale(1.08);
    }
    .stepper-btn:active { transform: scale(0.95); }

    .stepper-num {
        flex: 1;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border2);
        border-radius: 8px;
        color: #fff;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 32px; font-weight: 900;
        text-align: center; padding: 6px;
        outline: none;
    }

    .plain-num {
        width: 100%;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border2);
        border-radius: 8px;
        color: #fff;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 28px; font-weight: 700;
        text-align: center; padding: 8px;
        outline: none;
        transition: border-color 0.2s;
    }
    .plain-num:focus { border-color: rgba(210,255,0,0.4); }

    .name-input {
        width: 100%;
        background: #0a0f05 !important;
        -webkit-appearance: none;
        appearance: none;
        border: 1px solid rgba(210,255,0,0.2);
        border-radius: 8px;
        color: var(--lime) !important;
        font-family: 'Barlow Condensed', sans-serif !important;
        font-size: 18px; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase;
        padding: 10px 14px; outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        text-align: center;
        -webkit-text-fill-color: var(--lime);
    }
    .name-input::placeholder {
        color: rgba(210,255,0,0.18);
        -webkit-text-fill-color: rgba(210,255,0,0.18);
        font-style: normal;
    }
    .name-input:focus {
        border-color: rgba(210,255,0,0.5);
        box-shadow: 0 0 0 1px rgba(210,255,0,0.1);
    }
    .name-input:hover {
        border-color: rgba(210,255,0,0.35);
    }
    /* Kill browser autofill white bg */
    .name-input:-webkit-autofill,
    .name-input:-webkit-autofill:hover,
    .name-input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0px 1000px #0a0f05 inset !important;
        -webkit-text-fill-color: var(--lime) !important;
        border-color: rgba(210,255,0,0.3);
    }

    #player-names-container {
        display: flex; flex-direction: column; gap: 7px;
        margin-bottom: 18px;
    }

    .rule {
        height: 1px; background: var(--border2);
        margin: 22px 0;
    }

    /* ===================== BUTTON ===================== */
    .btn {
        display: block; width: 100%;
        padding: 15px 20px;
        border: none; border-radius: 10px;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 20px; font-weight: 900;
        letter-spacing: 0.08em; text-transform: uppercase;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        text-align: center;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-lime {
        background: var(--lime);
        color: var(--dark);
    }
    .btn-lime:hover:not(:disabled) {
        opacity: 0.92;
        box-shadow: 0 0 24px rgba(210,255,0,0.25);
    }

    .btn-red {
        background: var(--red);
        color: #fff;
        transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .btn-red:hover { box-shadow: 0 0 24px rgba(239,68,68,0.3); opacity: 0.9; }

    .btn-ghost {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border2);
        color: rgba(255,255,255,0.6);
        font-size: 16px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.09); }

    /* ===================== GAME SCREEN ===================== */
    #game-screen { gap: 18px; }

    .turn-header {
        text-align: center;
        width: 100%; max-width: 360px;
    }

    .turn-header .label {
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 4px;
    }

    .turn-header .name {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 40px; font-weight: 900; font-style: italic;
        text-transform: uppercase; letter-spacing: 0.04em;
        color: var(--lime);
        line-height: 1;
    }

    /* Card */
    #player-card {
        width: 100%; max-width: 360px;
        min-height: 460px;
        border: 1px solid var(--border2);
        border-radius: 16px;
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(16px);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        padding: 28px;
        transition: border-color 0.4s ease, transform 0.15s;
        position: relative; overflow: hidden;
    }
    #player-card:active { transform: scale(0.985); }
    #player-card:hover { border-color: rgba(210,255,0,0.15) !important; box-shadow: 0 0 30px rgba(210,255,0,0.04); }

    /* Card back */
    #card-back { text-align: center; }

    .card-back-ball {
        width: 64px; height: 64px;
        margin: 0 auto 20px;
        border-radius: 50%;
        border: 2px solid var(--border);
        display: flex; align-items: center; justify-content: center;
    }

    .card-back-ball svg { width: 36px; height: 36px; fill: var(--lime); opacity: 0.7; }

    .card-back-title {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 22px; font-weight: 900;
        letter-spacing: 0.2em; text-transform: uppercase;
        color: rgba(255,255,255,0.7);
        margin-bottom: 8px;
    }

    .card-back-sub {
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.2em; text-transform: uppercase;
        color: var(--muted);
    }

    /* Card inner */
    #card-inner { width: 100%; text-align: center; }

    #player-image {
        width: 100%; height: 260px;
        object-fit: cover;
        object-position: top center;
        border-radius: 10px;
        margin-bottom: 18px;
        border: 1px solid var(--border2);
    }

    #player-name {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 38px; font-weight: 900;
        letter-spacing: 0.02em; line-height: 1;
        text-transform: uppercase;
        margin-bottom: 6px;
    }

    #player-position {
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.28em; text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 18px; display: block;
    }

    #player-bio {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 28px; font-weight: 900;
        letter-spacing: 0.06em; text-transform: uppercase;
        color: var(--dark);
        background: var(--lime);
        padding: 10px 18px;
        border-radius: 8px;
        display: inline-block;
    }

    /* ===================== DEBATE ===================== */
    #debate-area {
        width: 100%; max-width: 360px;
        display: flex; flex-direction: column;
        align-items: center; gap: 18px;
    }

    .debate-eyebrow {
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: #eab308; text-align: center;
    }

    .timer-wrap {
        position: relative; width: 140px; height: 140px;
    }

    .timer-wrap svg {
        width: 100%; height: 100%; transform: rotate(-90deg);
    }

    .timer-center {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
    }

    #timer-display {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 56px; font-weight: 900;
        color: #eab308; line-height: 1;
    }

    #timer-ring { transition: stroke-dashoffset 1s linear; }

    /* ===================== REVEAL ===================== */

    .reveal-wrap {
        width: 100%; max-width: 360px;
        border: 1px solid var(--border2);
        border-radius: 16px;
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(16px);
        padding: 32px 28px;
        text-align: center;
    }

    .reveal-eyebrow {
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.35em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 14px;
    }

    .reveal-rule {
        height: 1px; background: var(--border2);
        margin-bottom: 20px;
    }

    .reveal-imp-label {
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: var(--red); margin-bottom: 12px;
    }

    .imp-badge {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.3);
        color: #fca5a5;
        font-family: 'Barlow', sans-serif;
        font-weight: 700; font-size: 13px;
        padding: 5px 14px; border-radius: 100px;
    }

    /* ===================== ANIMATIONS ===================== */
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes lineGrow {
        from { transform: scaleX(0); }
        to   { transform: scaleX(1); }
    }

    .a1 { animation: fadeUp 0.5s ease both; }
    .a2 { animation: fadeUp 0.5s 0.12s ease both; }
    .a3 { animation: fadeUp 0.5s 0.25s ease both; }
    .a4 { animation: fadeUp 0.5s 0.38s ease both; }

    /* Lime underline like Lando's nav current indicator */
    .lime-line {
        display: block;
        width: 40px; height: 2px;
        background: var(--lime);
        border-radius: 1px;
        margin: 8px auto 0;
        transform-origin: left;
        animation: lineGrow 0.5s 0.3s ease both;
        transform: scaleX(0);
    }

    @keyframes pulse-btn {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
        50%       { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
    }

    .pulse { animation: pulse-btn 1.2s infinite; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 0; }


    

    

    

    


    /* ===== MOBILE OPTIMIZATIONS ===== */
    @media (max-width: 480px) {
        .setup-logo h1 { font-size: 64px; }
        .setup-form { padding: 20px; }
        #player-card { min-height: 400px; padding: 20px; }
        #player-name { font-size: 28px; }
        #player-image { height: 220px; }
        .timer-wrap { width: 120px; height: 120px; }
        #timer-display { font-size: 44px; }
        .btn { padding: 14px; font-size: 18px; }
    }

    /* Prevent double-tap zoom on buttons */
    button, input {
        touch-action: manipulation;
    }

    /* Better tap targets on mobile */
    .btn { min-height: 52px; }
    .stepper-btn { min-width: 48px; min-height: 48px; }

</style>

var trail=[];
var MAX=22;
var img2=img;

function draw(){
    t+=0.016;
    // Add current pos to trail
    if(mx>=0){
        trail.push({x:mx,y:my,age:0});
        if(trail.length>MAX) trail.shift();
    }
    // Age trail points
    for(var i=0;i<trail.length;i++) trail[i].age++;

    ctx.clearRect(0,0,W,H);

    if(!img.complete||img.naturalWidth===0){ requestAnimationFrame(draw); return; }

    var sc=Math.max(W/img.naturalWidth,H/img.naturalHeight);
    var iw=img.naturalWidth*sc, ih=img.naturalHeight*sc;
    var ix=(W-iw)/2, iy=(H-ih)/2;

    // Draw each trail point from oldest to newest
    for(var i=0;i<trail.length;i++){
        var p=trail[i];
        var progress=i/trail.length; // 0=oldest 1=newest
        var R=8+progress*32;
        var alpha=progress*0.95;

        ctx.save();
        ctx.globalAlpha=alpha;
        ctx.beginPath();
        ctx.arc(p.x,p.y,R,0,Math.PI*2);
        ctx.clip();
        ctx.drawImage(img,ix,iy,iw,ih);
        ctx.restore();
    }

    requestAnimationFrame(draw);
}
draw();
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
document.addEventListener('mouseleave',function(){mx=-1;my=-1;trail=[];});
})();
</script>
