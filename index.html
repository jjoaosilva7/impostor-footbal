<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostor Football</title>

        .hidden { display: none !important; }

        /* SCREENS */
        .screen { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; width: 100%; }

        /* LOGO */
        .logo { text-align: center; margin-bottom: 40px; width: 100%; max-width: 360px; }
        .logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 72px; line-height: 0.9; letter-spacing: 0.04em; color: #fff; }
        .logo h1 span { color: #d2ff00; }
        .logo p { font-size: 11px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 8px; }

        /* FORM */
        .form-card { width: 100%; max-width: 360px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin: 0 auto; }
        .field { margin-bottom: 16px; }
        .field-label { font-size: 9px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; display: block; margin-bottom: 8px; text-align: center; }
        .lime { color: #d2ff00; }
        .red  { color: #ef4444; }
        .gold { color: #eab308; }

        .stepper { display: flex; align-items: center; gap: 8px; }
        .stepper-btn { width: 48px; height: 48px; background: rgba(210,255,0,0.08); border: 1px solid rgba(210,255,0,0.3); border-radius: 8px; color: #d2ff00; font-size: 24px; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .stepper-num { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 32px; text-align: center; padding: 8px; outline: none; }
        .plain-num { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 28px; text-align: center; padding: 8px; outline: none; }
        .name-input { width: 100%; background: #0a0f05; border: 1px solid rgba(210,255,0,0.25); border-radius: 8px; color: #d2ff00; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 14px; outline: none; text-align: center; -webkit-text-fill-color: #d2ff00; }
        .name-input::placeholder { color: rgba(210,255,0,0.2); -webkit-text-fill-color: rgba(210,255,0,0.2); }
        #player-names-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .rule { height: 1px; background: rgba(255,255,255,0.08); margin: 20px 0; }

        /* BUTTONS */
        .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.1em; cursor: pointer; min-height: 52px; }
        .btn-lime { background: #d2ff00; color: #0a0f05; }
        .btn-red  { background: #ef4444; color: #fff; }
        .btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

        /* GAME SCREEN */
        #game-screen { gap: 16px; }
        .turn-header { text-align: center; width: 100%; max-width: 360px; }
        .turn-header .label { font-size: 10px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
        .turn-header .name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.05em; color: #d2ff00; line-height: 1; }

        /* CARD */
        #player-card { width: 100%; max-width: 360px; min-height: 440px; border: 2px solid rgba(255,255,255,0.15); border-radius: 16px; background: rgba(255,255,255,0.03); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 24px; transition: border-color 0.3s; }
        #card-inner { width: 100%; text-align: center; }
        #player-image { width: 100%; height: 240px; object-fit: cover; object-position: top center; border-radius: 10px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
        #player-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.04em; margin-bottom: 6px; }
        #player-position { font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: #3b82f6; display: block; margin-bottom: 16px; }
        #player-bio { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.08em; color: #eab308; background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); border-radius: 8px; padding: 10px; }
        #card-back { text-align: center; }
        .card-back-icon { font-size: 52px; display: block; margin-bottom: 16px; }
        .card-back-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.15em; margin-bottom: 6px; }
        .card-back-sub { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.35); }

        /* DEBATE */
        #debate-area { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .debate-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: #eab308; }
        .timer-wrap { position: relative; width: 130px; height: 130px; }
        .timer-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        #timer-display { font-family: 'Bebas Neue', sans-serif; font-size: 50px; color: #eab308; line-height: 1; }
        #timer-ring { transition: stroke-dashoffset 1s linear; }

        /* REVEAL */
        .reveal-wrap { width: 100%; max-width: 360px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 24px; text-align: center; }
        .reveal-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
        #reveal-image { width: 100%; height: 180px; object-fit: cover; object-position: top; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; max-width: 360px; }
        #reveal-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 46px;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff 0%, #d2ff00 60%, #a8cc00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #reveal-pos { font-size: 10px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(210,255,0,0.7); display: block; margin-bottom: 20px; }
        .reveal-rule { height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 20px; }
        .reveal-imp-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #ef4444;
            margin-bottom: 12px;
        }
        #reveal-impostors { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
        .impostor-badge {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 0.08em;
            padding: 8px 20px;
            border-radius: 100px;
        }

        /* ANIMATIONS */
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .a1 { animation: fadeUp 0.5s ease both; }
        .a2 { animation: fadeUp 0.5s 0.15s ease both; }
        .a3 { animation: fadeUp 0.5s 0.3s ease both; }
        .a4 { animation: fadeUp 0.5s 0.45s ease both; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .animate-pulse { animation: pulse 1s infinite; }
    </style>
</head>
<body>

<!-- SETUP -->
<section id="setup-screen" class="screen">
    <div class="logo a1">
        <h1>IMPOSTOR<br><span>FOOTBALL</span></h1>
        <p>World Cup 2026 — Find the Fake</p>
    </div>
    <div class="form-card a2">
        <div class="field">
            <span class="field-label lime">Players</span>
            <div class="stepper">
                <button class="stepper-btn" id="btn-minus">−</button>
                <input type="number" id="input-player-count" class="stepper-num" value="4" min="2" max="12" readonly>
                <button class="stepper-btn" id="btn-plus">+</button>
            </div>
        </div>
        <div id="player-names-container">
            <input type="text" class="name-input" placeholder="Player 1" maxlength="20">
            <input type="text" class="name-input" placeholder="Player 2" maxlength="20">
            <input type="text" class="name-input" placeholder="Player 3" maxlength="20">
            <input type="text" class="name-input" placeholder="Player 4" maxlength="20">
        </div>
        <div class="rule"></div>
        <div class="field">
            <span class="field-label red">Impostors</span>
            <input type="number" id="input-impostor-count" class="plain-num" value="1" min="1" max="10">
        </div>
        <div class="field">
            <span class="field-label gold">Debate timer (sec)</span>
            <input type="number" id="input-timer" class="plain-num" value="60" min="10" max="300">
        </div>
        <div class="rule"></div>
        <button id="btn-start-game" class="btn btn-lime">Start Game</button>
    </div>
</section>

<!-- GAME -->
<section id="game-screen" class="screen hidden">
    <div class="turn-header">
        <p class="label" id="instruction-label">it's</p>
        <p class="name" id="instruction-text"></p>
    </div>
    <div id="player-card">
        <div id="card-inner" class="hidden">
            <img id="player-image" alt="player">
            <h2 id="player-name"></h2>
            <span id="player-position"></span>
            <p id="player-bio"></p>
        </div>
        <div id="card-back">
            <span class="card-back-icon">⚽</span>
            <p class="card-back-title">Tap to reveal</p>
            <p class="card-back-sub">Only you can see this</p>
        </div>
    </div>
    <button id="btn-next-turn" class="btn btn-lime hidden" style="max-width:360px;">Next Player →</button>
    <div id="debate-area" class="hidden">
        <p class="debate-eyebrow">⏱ Debate time</p>
        <div class="timer-wrap">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
                <circle id="timer-ring" cx="50" cy="50" r="44" fill="none" stroke="#eab308" stroke-width="5" stroke-linecap="round" stroke-dasharray="276.5" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-center"><span id="timer-display">60</span></div>
        </div>
        <button id="btn-reveal" class="btn btn-red" style="width:100%;max-width:360px;">🎭 Reveal Impostor</button>
    </div>
</section>

<!-- REVEAL -->
<section id="reveal-screen" class="screen hidden">
    <div class="reveal-wrap">
        <p class="reveal-eyebrow a1">The player was...</p>
        <img id="reveal-image" class="a2" alt="">
        <h2 id="reveal-name" class="a2"></h2>
        <span id="reveal-pos" class="a3"></span>
        <div class="reveal-rule a3"></div>
        <p class="reveal-imp-label a3">The impostor was</p>
        <div id="reveal-impostors" class="a4"></div>
        <button id="btn-new-game" class="btn btn-lime a4">Play Again</button>
    </div>
</section>

let jogadoresDisponiveis = [];

function jogadorAleatorio() {
  // Reset pool when empty
  if (jogadoresDisponiveis.length === 0) {
    jogadoresDisponiveis = [...JOGADORES];
  }
  const idx = Math.floor(Math.random() * jogadoresDisponiveis.length);
  const player = jogadoresDisponiveis[idx];
  jogadoresDisponiveis.splice(idx, 1); // remove from pool
  return player;
}

async function buscarFotoWikipedia(wikiSlug) {
  try {
    // Use Wikipedia action API with CORS support
    const url = 'https://en.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(wikiSlug.replace(/_/g,' ')) + '&prop=pageimages&format=json&pithumbsize=400&origin=*';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Wiki failed');
    const data = await res.json();
    const pages = data.query.pages;
    const page = pages[Object.keys(pages)[0]];
    return page.thumbnail ? page.thumbnail.source : imagemFallback();
  } catch(e) {
    return imagemFallback();
  }
}

function imagemFallback() {
  const fallbacks = [
    "https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=800",
    "https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=800",
    "https://images.unsplash.com/photo-1606925797300-0b35e9d1794e?w=800",
    "https://images.unsplash.com/photo-1553778263-73a83bab9b0c?w=800",
  ];
  return fallbacks[Math.floor(Math.random() * fallbacks.length)];
}

function atualizarCamposNomes() {
  const count = parseInt(document.getElementById('input-player-count').value) || 4;
  const container = document.getElementById('player-names-container');
  const inputs = container.querySelectorAll('input');

  // Show/hide existing inputs based on count
  inputs.forEach((input, i) => {
    if (i < count) {
      input.style.display = 'block';
      input.placeholder = `Player ${i + 1}`;
    } else {
      input.style.display = 'none';
    }
  });

  // Add more inputs if needed
  if (inputs.length < count) {
    for (let i = inputs.length; i < count; i++) {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = `Player ${i + 1}`;
      input.maxLength = 20;
      input.className = 'name-input';
      container.appendChild(input);
    }
  }
}

document.getElementById('btn-plus').addEventListener('click', () => {
  const input = document.getElementById('input-player-count');
  if (parseInt(input.value) < 12) {
    input.value = parseInt(input.value) + 1;
    atualizarCamposNomes();
  }
});

document.getElementById('btn-minus').addEventListener('click', () => {
  const input = document.getElementById('input-player-count');
  if (parseInt(input.value) > 2) {
    input.value = parseInt(input.value) - 1;

  }
});

async function iniciarJogo() {
  const btn = document.getElementById('btn-start-game');
  btn.innerText = "LOADING...";
  btn.disabled = true;

  try {
    const player = jogadorAleatorio();

    // Try to get photo but don't block the game if it fails
    let imgUrl = imagemFallback();
    try {
      imgUrl = await Promise.race([
        buscarFotoWikipedia(player.wiki),
        new Promise((_, reject) => setTimeout(() => reject('timeout'), 5000))
      ]);
    } catch(photoErr) {
      console.log('Photo failed, using fallback');
    }

    sharedPlayerIdentity = { ...player, img: imgUrl };

    totalPlayers = parseInt(document.getElementById('input-player-count').value) || 4;
    let impostorCount = parseInt(document.getElementById('input-impostor-count').value) || 1;
    impostorCount = Math.min(impostorCount, totalPlayers - 1);

    const nameInputs = document.getElementById('player-names-container').querySelectorAll('input');
    playerNames = Array.from(nameInputs).map((inp, i) => inp.value.trim() || `Player ${i + 1}`);

    impostorIndices = [];
    while (impostorIndices.length < impostorCount) {
      let r = Math.floor(Math.random() * totalPlayers);
      if (!impostorIndices.includes(r)) impostorIndices.push(r);
    }

    currentPlayerIndex = 0;
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    prepararVez();

  } catch (e) {
    console.error("Game error:", e);
    btn.innerText = "START GAME";
    btn.disabled = false;
    alert("Something went wrong. Please try again.");
  }
}

function prepararVez() {
  const card = document.getElementById('player-card');
  card.classList.remove('hidden');
  card.style.borderColor = 'rgba(255,255,255,0.2)';
  document.getElementById('card-inner').classList.add('hidden');
  document.getElementById('card-back').classList.remove('hidden');
  document.getElementById('btn-next-turn').classList.add('hidden');
  const nome = playerNames[currentPlayerIndex] || `Jogador ${currentPlayerIndex + 1}`;
  const label = document.getElementById('instruction-label');
  const action = document.getElementById('instruction-text');
  if (label) label.innerText = "IT'S";
  if (action) action.innerText = nome.toUpperCase() + "'S TURN";
}

document.getElementById('player-card').addEventListener('click', () => {
  if (!document.getElementById('card-inner').classList.contains('hidden')) return;

  const isImpostor = impostorIndices.includes(currentPlayerIndex);
  const data = isImpostor
    ? {
        name: "YOU ARE THE IMPOSTOR",
        pos: "FAKER",
        bio: (() => {
            const dicas = [sharedPlayerIdentity.foot, sharedPlayerIdentity.pos_type, sharedPlayerIdentity.continent];
            const dica = dicas[Math.floor(Math.random() * dicas.length)];
            return `Your clue: "${dica}"`;
        })(),
        img: IMPOSTOR_IMG
      }
    : { ...sharedPlayerIdentity, bio: "" };

  document.getElementById('player-name').innerText = data.name;
  document.getElementById('player-position').innerText = data.pos;
  document.getElementById('player-bio').innerText = data.bio;
  document.getElementById('player-image').src = data.img;

  document.getElementById('card-back').classList.add('hidden');
  document.getElementById('card-inner').classList.remove('hidden');
  document.getElementById('btn-next-turn').classList.remove('hidden');
  document.getElementById('player-card').style.borderColor = isImpostor ? "#ef4444" : "#3b82f6";
});

document.getElementById('btn-next-turn').addEventListener('click', () => {
  currentPlayerIndex++;
  if (currentPlayerIndex < totalPlayers) {
    prepararVez();
  } else {
    // Todos viram a carta — iniciar debate com timer
    const lbl = document.getElementById('instruction-label');
    const act = document.getElementById('instruction-text');
    if (lbl) lbl.innerText = '🗣️';
    if (act) act.innerText = 'OPEN DEBATE!';
    document.getElementById('player-card').classList.add('hidden');
    document.getElementById('btn-next-turn').classList.add('hidden');
    document.getElementById('debate-area').classList.remove('hidden');
    iniciarTimer();
  }
});

// TIMER DE DEBATE
// =====================================================
let timerInterval = null;

function iniciarTimer() {
  const totalSegundos = parseInt(document.getElementById('input-timer').value) || 60;
  let restante = totalSegundos;
  const circumference = 276.5;
  const ring = document.getElementById('timer-ring');
  const display = document.getElementById('timer-display');

  display.innerText = restante;
  ring.style.strokeDashoffset = 0;

  timerInterval = setInterval(() => {
    restante--;
    display.innerText = restante;

    // Atualiza o anel
    const progress = (totalSegundos - restante) / totalSegundos;
    ring.style.strokeDashoffset = circumference * progress;

    // Muda cor conforme o tempo
    if (restante <= 10) {
      ring.style.stroke = '#ef4444';
      display.style.color = '#ef4444';
    } else if (restante <= 20) {
      ring.style.stroke = '#f97316';
      display.style.color = '#f97316';
    }

    if (restante <= 0) {
      clearInterval(timerInterval);
      display.innerText = '0';
      // Pisca o botão de revelar
      document.getElementById('btn-reveal').classList.add('animate-pulse');
    }
  }, 1000);
}

  document.getElementById('reveal-pos').innerText = sharedPlayerIdentity.pos;

  // Lista os impostores com label correto
  const container = document.getElementById('reveal-impostors');
  container.innerHTML = '';
  const impostorLabel = document.querySelector('.reveal-impostors-label');
  if (impostorLabel) {
    impostorLabel.innerText = impostorIndices.length === 1 ? 'The impostor was' : 'The impostors were';
  }
  impostorIndices.forEach(i => {
    const badge = document.createElement('span');
    badge.className = 'impostor-badge';
    badge.innerText = playerNames[i] || `Player ${i + 1}`;
    container.appendChild(badge);
  });

  // Troca de tela
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('reveal-screen').classList.remove('hidden');
});

// =====================================================
// NOVA PARTIDA
// =====================================================
document.getElementById('btn-new-game').addEventListener('click', () => {
  currentPlayerIndex = 0;
  impostorIndices = [];
  sharedPlayerIdentity = null;
  playerNames = [];
  jogadoresDisponiveis = [];
  clearInterval(timerInterval);

  // Reset timer visual
  document.getElementById('timer-ring').style.strokeDashoffset = 0;
  document.getElementById('timer-ring').style.stroke = '#eab308';
  document.getElementById('timer-display').style.color = '#facc15';
  document.getElementById('debate-area').classList.add('hidden');
  document.getElementById('btn-reveal').classList.remove('animate-pulse');

  document.getElementById('reveal-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  document.getElementById('btn-start-game').innerText = 'START GAME';
  document.getElementById('btn-start-game').disabled = false;
});

document.getElementById('btn-start-game').addEventListener('click', iniciarJogo);

</script>
</body>
</html>
